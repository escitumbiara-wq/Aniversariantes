<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Calendário de Aniversariantes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      
      /* FUNDO COM IMAGEM */
      background: url('https://i.imgur.com/9bicQHM.jpeg') no-repeat center center fixed;
      background-size: cover;

      margin: 0;
      padding: 0;
    }

    .card {
      max-width: 420px;
      margin: 80px auto;
      background: rgba(255, 255, 255, 0.92); /* leve transparência */
      padding: 28px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px); /* efeito vidro (moderno) */
    }

    h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #555;
      line-height: 1.5;
    }

    .btn {
      display: block;
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      color: white;
    }

    .ios {
      background: #007AFF;
    }

    .android {
      background: #34A853;
    }

    .view {
      background: #8E8E93;
    }

    .small {
      font-size: 13px;
      color: #777;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🎂 Calendário de Aniversariantes</h1>

    <p>
      Adicione o calendário oficial para receber automaticamente os aniversários todos os anos.
    </p>

    <!-- iOS -->
    <a class="btn ios"
       href="webcal://raw.githubusercontent.com/escitumbiara-wq/Aniversariantes/main/Aniversariantes.ics">
      📱 Adicionar calendário iOS
    </a>

    <!-- Android -->
    <a class="btn android"
       href="https://calendar.google.com/calendar/render?cid=cfns319dgd9t0kmlptluqoioh54v32it@import.calendar.google.com"
       target="_blank">
      🤖 Adicionar calendário Android
    </a>

    <!-- Ver calendário -->
    <a class="btn view"
       href="https://calendar.google.com/calendar/embed?src=cfns319dgd9t0kmlptluqoioh54v32it@import.calendar.google.com"
       target="_blank">
      👀 Ver calendário
    </a>

    <p class="small">
      Compatível com iOS, Android, Outlook e Web.
    </p>
  </div>

</body>
</html>
